<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation | Riska & Saleh</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
    background:#f6eee3;
    color:#6d4f3a;
    position:relative;
}

/* =========================
BACKGROUND
========================= */

.background{
    position:fixed;
    inset:0;
    z-index:-20;

    background:
    linear-gradient(rgba(246,238,227,.82), rgba(246,238,227,.90)),
    url('https://i.pinimg.com/736x/2c/27/69/2c27691c7160c4c8cb1c3397aaaa24fd.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    animation:bgZoom 18s ease-in-out infinite alternate;
}

@keyframes bgZoom{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }

}

/* =========================
FLOWERS
========================= */

.flower-layer{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:-5;
}

.flower{
    position:absolute;
    bottom:-400px;

    opacity:.95;

    animation-name:flowerFloat;
    animation-timing-function:linear;
    animation-iteration-count:infinite;

    pointer-events:none;

    background:none;
}

.flower img{

    width:100%;
    height:100%;

    object-fit:contain;

    mix-blend-mode:multiply;

    background:none;

    filter:
    drop-shadow(0 10px 20px rgba(0,0,0,.12));
}

/* FLOWERS */

.flower1{
    width:190px;
    left:-30px;
    animation-duration:18s;
}

.flower2{
    width:240px;
    right:-50px;
    animation-duration:22s;
    animation-delay:2s;
}

.flower3{
    width:150px;
    left:40%;
    animation-duration:16s;
    animation-delay:5s;
}

.flower4{
    width:120px;
    left:15%;
    animation-duration:20s;
    animation-delay:7s;
}

.flower5{
    width:140px;
    right:18%;
    animation-duration:19s;
    animation-delay:4s;
}

.flower6{
    width:180px;
    left:65%;
    animation-duration:24s;
    animation-delay:3s;
}

.flower7{
    width:110px;
    left:55%;
    animation-duration:17s;
    animation-delay:8s;
}

.flower8{
    width:170px;
    left:78%;
    animation-duration:25s;
    animation-delay:1s;
}

/* FLOWER ANIMATION */

@keyframes flowerFloat{

    0%{

        transform:
        translateY(0)
        translateX(0)
        rotate(0deg)
        scale(.6);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    50%{

        transform:
        translateY(-60vh)
        translateX(25px)
        rotate(8deg)
        scale(1);

    }

    100%{

        transform:
        translateY(-150vh)
        translateX(-20px)
        rotate(16deg)
        scale(1.1);

        opacity:0;
    }

}

/* =========================
MUSIC BUTTON
========================= */

.music-btn{

    position:fixed;

    top:20px;
    right:20px;

    width:56px;
    height:56px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.7);

    backdrop-filter:blur(10px);

    font-size:1.1rem;

    cursor:pointer;

    z-index:999;

    box-shadow:
    0 10px 20px rgba(0,0,0,.1);

    transition:.3s;
}

.music-btn:hover{
    transform:scale(1.08);
}

/* =========================
SECTIONS
========================= */

section{

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:40px 20px;

    position:relative;
}

/* =========================
CARD
========================= */

.card{

    width:100%;
    max-width:450px;

    background:rgba(255,255,255,.35);

    backdrop-filter:blur(16px);

    border:
    1px solid rgba(255,255,255,.6);

    border-radius:40px;

    padding:50px 28px;

    text-align:center;

    box-shadow:
    0 10px 35px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.5);

    animation:fadeUp 1s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
TEXT
========================= */

h1,h2,h3{
    font-family:'Cormorant Garamond',serif;
}

.label{

    font-size:.72rem;

    letter-spacing:5px;

    color:#a47b58;

    margin-bottom:18px;
}

.main-title{

    font-size:4rem;

    line-height:1;

    color:#6d4f3a;
}

.and{

    font-size:2rem;

    color:#c8a06c;

    margin:8px 0;
}

.sub{

    margin-top:18px;

    font-size:.95rem;

    line-height:1.9;

    color:#7a6553;
}

.line{

    width:90px;
    height:1px;

    background:#c8a06c;

    margin:24px auto;
}

.section-title{

    font-size:2.8rem;

    color:#6d4f3a;

    margin-bottom:18px;
}

.desc{

    line-height:2;

    font-size:.94rem;

    color:#6f5948;
}

/* =========================
BUTTON
========================= */

.btn{

    display:inline-block;

    margin-top:35px;

    padding:15px 35px;

    border-radius:50px;

    background:
    linear-gradient(
    135deg,
    #d8b58a,
    #8b6546
    );

    color:#fff;

    text-decoration:none;

    font-size:.8rem;

    letter-spacing:2px;

    transition:.3s;

    box-shadow:
    0 10px 20px rgba(140,103,71,.25);
}

.btn:hover{

    transform:translateY(-3px);
}

/* =========================
COUPLE
========================= */

.couple-name{

    font-size:2.5rem;

    color:#6d4f3a;

    margin-top:18px;
}

/* =========================
COUNTDOWN
========================= */

.countdown{

    display:flex;
    justify-content:center;
    gap:10px;

    margin:35px 0;
}

.time-box{

    width:75px;

    background:rgba(255,255,255,.65);

    border-radius:22px;

    padding:16px 10px;

    box-shadow:
    0 8px 18px rgba(0,0,0,.05);
}

.time-box span{

    display:block;

    font-size:1.7rem;
    font-weight:600;

    color:#6d4f3a;
}

.time-box small{

    font-size:.68rem;

    letter-spacing:1px;

    color:#8b725f;
}

/* =========================
GALLERY
========================= */

.gallery{
    margin-top:25px;
}

.gallery img{

    width:100%;
    height:450px;

    object-fit:cover;

    border-radius:30px;

    transition:.5s;

    box-shadow:
    0 10px 25px rgba(0,0,0,.08);
}

.gallery img:hover{
    transform:scale(1.03);
}

/* =========================
FORM
========================= */

.form{

    margin-top:30px;

    display:flex;
    flex-direction:column;

    gap:16px;
}

.form input,
.form textarea,
.form select{

    width:100%;

    border:none;

    background:rgba(255,255,255,.75);

    border-radius:18px;

    padding:16px;

    outline:none;

    font-family:inherit;

    color:#6d4f3a;
}

.form textarea{
    height:130px;
    resize:none;
}

.submit-btn{

    border:none;

    padding:16px;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    #d8b58a,
    #8b6546
    );

    color:#fff;

    letter-spacing:2px;

    cursor:pointer;

    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-2px);
}

/* =========================
FOOTER
========================= */

.footer{

    padding:40px 20px 70px;

    text-align:center;

    color:#8b725f;

    font-size:.82rem;

    line-height:1.8;
}

/* =========================
MOBILE
========================= */

@media(max-width:480px){

    .main-title{
        font-size:3.2rem;
    }

    .section-title{
        font-size:2.2rem;
    }

    .gallery img{
        height:340px;
    }

    .card{
        padding:40px 22px;
    }

    .countdown{
        gap:8px;
    }

    .time-box{
        width:68px;
    }

}

</style>
</head>

<body>

</body>
</html>
